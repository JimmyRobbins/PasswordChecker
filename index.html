<!DOCTYPE html>
<html lang="ja">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh; /* Changed to 100vh so it fills the whole screen */
    margin: 0;
    
    /* The Animated Gradient Background */
    background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
    background-size: 400% 400%;
    animation: gradientBG 15s ease infinite;
}
        .game-container {
            text-align: center;
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        /* Shake Animation Class */
        .shake {
            animation: shakeAnim 0.4s ease-in-out;
        }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            15%, 45%, 75% { transform: translateX(-10px); }
            30%, 60%, 90% { transform: translateX(10px); }
        }
        h2 {
            color: #333;
            margin-bottom: 20px;
        }
      .code-container {
    display: flex;
    justify-content: center; /* Centers the boxes */
    gap: 8px; /* Adds consistent, safe spacing between boxes */
    margin-bottom: 25px;
}

.code-input {
    width: 100%; /* Tells the box to take up equal space */
    max-width: 45px; /* Stops the box from getting too huge on desktop */
    height: 55px;
    font-size: clamp(18px, 5vw, 24px); /* Dynamically shrinks the font on small screens! */
    font-weight: bold;
    text-align: center;
    border: 2px solid #ccc;
    border-radius: 8px;
    padding: 0; /* Prevents hidden padding from inflating the box */
}
        .code-input:focus {
            border-color: #4285f4;
            outline: none;
        }
        .submit-btn, .retry-btn {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            width: 100%;
        }
        .submit-btn:hover {
            background-color: #357ae8;
        }
        .submit-btn:active, .retry-btn:active {
            transform: scale(0.98);
        }
        .retry-btn {
            background-color: #5f6368;
            margin-top: 20px;
        }
        .retry-btn:hover {
            background-color: #4a4e51;
        }
        .error-message {
            color: #d93025;
            font-size: 14px;
            margin-top: 15px;
            min-height: 20px;
            font-weight: bold;
        }
        .hidden {
            display: none !important;
        }
        .win-screen {
            animation: fadeIn 0.5s ease-in-out;
            padding: 10px;
        }
        .win-screen h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .win-screen p {
            color: #666;
            font-size: 18px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

<div id="main-card" class="game-container">
    <div id="game-screen">
        <h2>七桁のパスワードを入力</h2>
        <div class="code-container">
            <input type="text" class="code-input" maxlength="1" autofocus>
            <input type="text" class="code-input" maxlength="1">
            <input type="text" class="code-input" maxlength="1">
            <input type="text" class="code-input" maxlength="1">
            <input type="text" class="code-input" maxlength="1">
            <input type="text" class="code-input" maxlength="1">
            <input type="text" class="code-input" maxlength="1">
        </div>
        <button id="submit-btn" class="submit-btn">送信</button>
        <div id="msg" class="error-message"></div>
    </div>

    <div id="result-screen" class="hidden">
        <div id="screen-content" class="win-screen"></div>
        <button id="retry-btn" class="retry-btn">もう一度試す</button>
    </div>
</div>

    <script src="script.js"></script>

</body>
</html>
